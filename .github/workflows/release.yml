name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Publish
        run: dotnet publish Sonar.AutoSwitch/Sonar.AutoSwitch.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --nologo

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Sonar.AutoSwitch/bin/Release/net7.0/win-x64/publish/Sonar.AutoSwitch.exe
